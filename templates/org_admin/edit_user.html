{% extends "base.html" %}
{% load static %}

{% block content %}
<style>
.admin-page {
    font-family: 'DM Sans', sans-serif;
    padding-bottom: 4rem;
}

/* Header */
.admin-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.75rem;
    flex-wrap: wrap;
    gap: 0.75rem;
}

.admin-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.75rem;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 0.6rem;
}

.admin-title i {
    color: var(--primary);
}

.back-link {
    text-decoration: none;
    font-size: 0.85rem;
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
}

.back-link:hover {
    color: var(--text-primary);
}

/* Panel */
.admin-panel {
    background: #fff;
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    max-width: 600px;
    margin: auto;
}

.panel-head {
    padding: 1.1rem 1.5rem;
    border-bottom: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    gap: 0.6rem;
}

.panel-title {
    font-size: 0.9rem;
    font-weight: 700;
    margin: 0;
}

.panel-body {
    padding: 1.5rem;
}

/* Form */
.form-label-custom {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
    display: block;
}

.form-control,
.form-select {
    width: 100%;
    border: 1.5px solid var(--border-color);
    border-radius: var(--radius-sm);
    padding: 0.65rem 0.9rem;
    font-size: 0.9rem;
    background: var(--bg-subtle);
    transition: 0.2s;
}

.form-control:focus,
.form-select:focus {
    border-color: var(--primary);
    background: #fff;
    box-shadow: 0 0 0 3px var(--primary-ring);
    outline: none;
}

/* Buttons */
.btn-primary-custom {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    padding: 0.75rem 1.5rem;
    background: linear-gradient(135deg, #065f46, #059669);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
}

.btn-primary-custom:hover {
    opacity: 0.9;
    transform: translateY(-1px);
}

.btn-danger-custom {
    width: 100%;
    padding: 0.75rem;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--danger);
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
}

.btn-danger-custom:hover {
    opacity: 0.9;
}

/* Divider */
.section-divider {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border-light);
}

/* Danger Box */
.danger-box {
    background: var(--danger-light);
    border: 1px solid var(--danger-border);
    border-radius: var(--radius-md);
    padding: 1rem;
    margin-top: 0.5rem;
}

.danger-text {
    font-size: 0.8rem;
    color: var(--danger);
    margin-bottom: 0.75rem;
}

@media (max-width: 576px) {
    .panel-body {
        padding: 1.2rem;
    }
}
</style>

<div class="admin-page">

    <!-- Header -->
    <div class="admin-header">
        <h1 class="admin-title">
            <i class="fas fa-user-edit"></i> Edit User
        </h1>

        <a href="{% url 'org_admin_users' %}" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Users
        </a>
    </div>

    <!-- Panel -->
    <div class="admin-panel">

        <!-- Update Section -->
        <div class="panel-head">
            <i class="fas fa-user" style="color:var(--primary);font-size:0.9rem;"></i>
            <h5 class="panel-title">User Information</h5>
        </div>

        <div class="panel-body">
            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label-custom">Email</label>
                    <input type="email"
                           name="email"
                           value="{{ profile.user.email }}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-4">
                    <label class="form-label-custom">Role</label>
                    <select name="role" class="form-select">
                        <option value="staff"
                            {% if profile.role == "staff" %}selected{% endif %}>
                            Staff
                        </option>
                        <option value="pharmacist"
                            {% if profile.role == "pharmacist" %}selected{% endif %}>
                            Pharmacist
                        </option>
                    </select>
                </div>

                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn-primary-custom">
                        <i class="fas fa-check-circle"></i> Update User
                    </button>
                </div>
            </form>

            <!-- Delete Section -->
            <div class="section-divider">
                <h6 style="font-weight:700;margin-bottom:0.5rem;">
                    Danger Zone
                </h6>

                <div class="danger-box">
                    <div class="danger-text">
                        Deleting this user will permanently remove their access.
                    </div>

                    <form method="POST"
                          action="{% url 'org_admin_delete_user' profile.id %}"
                          onsubmit="return confirm('Are you sure you want to delete this user?');">
                        {% csrf_token %}
                        <button type="submit" class="btn-danger-custom">
                            <i class="fas fa-trash"></i> Delete User
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>

</div>
{% endblock %}
